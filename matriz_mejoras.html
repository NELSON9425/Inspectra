<!DOCTYPE html>
<html lang="es">
<head>

<title>Matriz de mejoras</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
    padding:40px;
}

.volver{
    display:block;
    width:fit-content;
    margin:40px auto 0 auto;
    background:#f2b300;
    color:#111;
    padding:12px 22px;

    text-decoration:none;
    font-weight:bold;
    border:2px solid #f2b300;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);

.volver:hover{
    background:white;
    color:#111;
    border:2px solid #f2b300;
    transform:translateY(-2px);
}
    
h1{
    text-align:center;
    margin-bottom:40px;
}

.contenedor{
    max-width:700px;
    margin:auto;
}

.documento{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:15px;
    text-decoration:none;
    display:block;
    color:#111;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    border-left:6px solid #f2b300;
    transition:0.3s;
    font-size:20px;
}

.documento:hover{
    transform:translateY(-3px);
}

</style>
</head>
